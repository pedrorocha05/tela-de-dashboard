<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

<body>
    <section id="menu-lateral">
        <div id="logo">
            <img src="../assetes/undefined - Imgur (1).png" alt="">
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-bars"></i>
            <p>Dashboard</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-book-open"></i>
            <p>Meus Cursos</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-medal"></i>
            <p>Certificados</p>
        </div>
        <div class="box-icon">
            <i class="fa-regular fa-heart"></i>
            <p>Favoritos</p>
        </div>
        <div class="box-icon">
            <i class="fa-regular fa-clock"></i>
            <p>Historico</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-user"></i>
            <p>perfil</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-gear"></i>
            <p>Configurações</p>
        </div>

        <div id="box-hr">
            <hr>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <p>sair</p>
        </div>
    </section>
    <section>
        <div id="cabecalho">
            <div id="box-search">
                <div id="box-input">
                    <input type="text" placeholder="Buscar cursos...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div id="box-avatar">
                    <i class="fa-regular fa-bell"></i>
                    <img src="../assetes/undefined - Imgur (2).png" alt="">
                </div>
            </div>
        </div>
        <div id="regresso">
            <div class="total">
                <div class="libro">
                    <i class="fa-solid fa-book-open"></i>

                </div>
                <div>
                    <strong>12</strong>
                    <p>Cursos matriculados</p>
                    <a href="">ver todos</a>
                </div>
            </div>
            <div class="total">
                <div class="libro">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div>
                    <strong>5</strong>
                    <p>Em andamento</p>
                    <a href="">continuar</a>
                </div>
            </div>
            <div class="total">
                <div class="libro">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                <div>
                    <strong>3</strong>
                    <p>Concluidos</p>
                    <a href="">Certificados</a>
                </div>
            </div>
            <div class="total">
                <div class="libro">
                    <i class="fa-regular fa-clock"></i>
                </div>
                <div>
                    <strong>24H</strong>
                    <p>Carga Horaria</p>
                    <a href="">Ver Historico</a>
                </div>
            </div>
        </div>
        <div >

        </div>

        </div>

        </div>
